<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Wallet Manager</title>
<link rel="icon" type="image/jpeg" href="title_logo.jpeg">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root {
  --primary: #27ae60;
  --primary-dark: #219150;
  --secondary: #3498db;
  --secondary-dark: #2980b9;
  --danger: #e74c3c;
  --danger-dark: #c0392b;
  --warning: #f39c12;
  --dark: #2c3e50;
  --light: #ecf0f1;
  --border: #dcdcdc;
  --shadow: rgba(0,0,0,0.08);
  --shadow-lg: rgba(0,0,0,0.15);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 20px 10px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 30px;
  color: white;
}

.header h1 {
  font-size: 2.5rem;
  margin-bottom: 5px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
}

.header p {
  opacity: 0.9;
  font-size: 1.1rem;
}

/* Cards */
.card {
  background: white;
  border-radius: 16px;
  padding: 25px;
  margin-bottom: 25px;
  box-shadow: 0 8px 24px var(--shadow-lg);
  transition: transform 0.2s;
}

.card:hover {
  transform: translateY(-2px);
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding-bottom: 15px;
  border-bottom: 2px solid var(--light);
}

.card-title {
  font-size: 1.5rem;
  color: var(--dark);
  font-weight: 600;
}

.card-icon {
  font-size: 1.8rem;
}

/* Grid Layout */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
  margin-bottom: 25px;
}

/* Form Elements */
.form-group {
  margin-bottom: 18px;
}

.form-label {
  display: block;
  margin-bottom: 8px;
  font-weight: 600;
  color: var(--dark);
  font-size: 0.95rem;
}

.form-input {
  width: 100%;
  padding: 12px 15px;
  border: 2px solid var(--border);
  border-radius: 8px;
  font-size: 1rem;
  transition: all 0.3s;
  font-family: inherit;
}

.form-input:focus {
  outline: none;
  border-color: var(--secondary);
  box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
}

.form-select {
  width: 100%;
  padding: 12px 15px;
  border: 2px solid var(--border);
  border-radius: 8px;
  font-size: 1rem;
  background-color: white;
  cursor: pointer;
  transition: all 0.3s;
}

.form-select:focus {
  outline: none;
  border-color: var(--secondary);
  box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
}

/* Radio Group */
.radio-group {
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
}

.radio-label {
  display: flex;
  align-items: center;
  cursor: pointer;
  padding: 10px 18px;
  border: 2px solid var(--border);
  border-radius: 8px;
  transition: all 0.3s;
  font-weight: 500;
}

.radio-label:hover {
  border-color: var(--secondary);
  background-color: rgba(52, 152, 219, 0.05);
}

.radio-label input[type="radio"] {
  margin-right: 8px;
  cursor: pointer;
}

.radio-label input[type="radio"]:checked + span {
  color: var(--secondary);
}

/* Buttons */
.btn {
  padding: 12px 24px;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  text-transform: capitalize;
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px var(--shadow);
}

.btn:active {
  transform: translateY(0);
}

.btn:disabled {
  background: #95a5a6;
  cursor: not-allowed;
  opacity: 0.6;
}

.btn:disabled:hover {
  transform: none;
  box-shadow: none;
}

.btn-primary {
  background: var(--primary);
  color: white;
}

.btn-primary:hover {
  background: var(--primary-dark);
}

.btn-secondary {
  background: var(--secondary);
  color: white;
}

.btn-secondary:hover {
  background: var(--secondary-dark);
}

.btn-danger {
  background: var(--danger);
  color: white;
}

.btn-danger:hover {
  background: var(--danger-dark);
}

.btn-sm {
  padding: 6px 12px;
  font-size: 0.875rem;
}

.btn-group {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

/* Info Box */
.info-box {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 20px;
  border-radius: 12px;
  margin-top: 15px;
  display: none;
}

.info-box.show {
  display: block;
}

.info-box strong {
  display: block;
  margin-bottom: 10px;
  font-size: 1.1rem;
}

.info-item {
  padding: 5px 0;
  opacity: 0.95;
}

/* Stats Cards */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  margin-bottom: 25px;
}

.stat-card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 12px var(--shadow);
  border-left: 4px solid var(--primary);
}

.stat-label {
  font-size: 0.875rem;
  color: #7f8c8d;
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.stat-value {
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--dark);
}

.stat-subtext {
  font-size: 0.875rem;
  color: #95a5a6;
  margin-top: 5px;
}

/* Balance Grid */
.balance-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 12px;
  margin-top: 15px;
}

.balance-item {
  background: var(--light);
  padding: 12px 15px;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-left: 3px solid var(--secondary);
}

.balance-label {
  font-weight: 500;
  color: var(--dark);
  font-size: 0.9rem;
}

.balance-value {
  font-weight: 700;
  color: var(--secondary);
}

.balance-change {
  font-size: 0.85rem;
  color: #7f8c8d;
}

.balance-change.positive {
  color: var(--primary);
}

.balance-change.negative {
  color: var(--danger);
}

/* Transaction List */
.transaction-item {
  background: white;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 15px;
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: all 0.3s;
}

.transaction-item:hover {
  box-shadow: 0 4px 12px var(--shadow);
  transform: translateX(5px);
}

.transaction-content {
  flex: 1;
  font-size: 0.95rem;
  color: var(--dark);
}

.transaction-serial {
  font-weight: 700;
  color: var(--secondary);
  margin-right: 10px;
}

.transaction-actions {
  display: flex;
  gap: 8px;
}

/* Modal */
.modal {
  display: none;
  position: fixed;
  z-index: 1000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  overflow: auto;
  background-color: rgba(0,0,0,0.6);
  animation: fadeIn 0.3s;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal-content {
  background-color: white;
  margin: 3% auto;
  padding: 0;
  border-radius: 16px;
  width: 90%;
  max-width: 600px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  animation: slideIn 0.3s;
}

@keyframes slideIn {
  from {
    transform: translateY(-50px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

.modal-header {
  padding: 20px 25px;
  border-bottom: 2px solid var(--light);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.modal-header h2 {
  margin: 0;
  color: var(--dark);
}

.close {
  color: #aaa;
  font-size: 32px;
  font-weight: bold;
  cursor: pointer;
  line-height: 20px;
  transition: color 0.3s;
}

.close:hover,
.close:focus {
  color: var(--danger);
}

.modal-body {
  padding: 25px;
}

.modal-footer {
  padding: 20px 25px;
  border-top: 1px solid var(--light);
  text-align: right;
}

/* Toast Notification */
.toast {
  position: fixed;
  top: 20px;
  right: 20px;
  background: white;
  padding: 16px 20px;
  border-radius: 8px;
  box-shadow: 0 4px 16px var(--shadow-lg);
  display: none;
  align-items: center;
  gap: 12px;
  z-index: 2000;
  animation: slideInRight 0.3s;
  min-width: 300px;
}

@keyframes slideInRight {
  from {
    transform: translateX(100%);
    opacity: 0;
  }
  to {
    transform: translateX(0);
    opacity: 1;
  }
}

.toast.show {
  display: flex;
}

.toast-success {
  border-left: 4px solid var(--primary);
}

.toast-error {
  border-left: 4px solid var(--danger);
}

.toast-icon {
  font-size: 1.5rem;
}

.toast-message {
  flex: 1;
}

/* Responsive */
@media (max-width: 768px) {
  .header h1 {
    font-size: 2rem;
  }
  
  .card {
    padding: 20px;
  }
  
  .grid {
    grid-template-columns: 1fr;
  }
  
  .transaction-item {
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
  }
  
  .transaction-actions {
    width: 100%;
    justify-content: flex-end;
  }
  
  .stat-value {
    font-size: 1.5rem;
  }
}

/* Loading Spinner */
.spinner {
  border: 3px solid var(--light);
  border-top: 3px solid var(--secondary);
  border-radius: 50%;
  width: 20px;
  height: 20px;
  animation: spin 1s linear infinite;
  display: inline-block;
  margin-left: 10px;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Empty State */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: #7f8c8d;
}

.empty-state-icon {
  font-size: 4rem;
  margin-bottom: 15px;
  opacity: 0.5;
}

.empty-state-text {
  font-size: 1.1rem;
}
</style>
</head>

<body>
<div class="container">
  
  <!-- Header -->
  <div class="header">
    <h1>💳 Digital Wallet Manager</h1>
    <p>Track your bKash & Nagad transactions with ease</p>
  </div>

  <!-- Initial Setup Grid -->
  <div class="grid">
    
    <!-- Initial Cash Card -->
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">💵 Initial Cash</h2>
      </div>
      <div class="form-group">
        <label class="form-label">Amount</label>
        <input type="number" id="initialCash" class="form-input" placeholder="Enter initial cash amount">
      </div>
    </div>

    <!-- bKash Accounts Card -->
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">📱 bKash Accounts</h2>
      </div>
      <div class="form-group">
        <label class="form-label">01840606094 (Agent)</label>
        <input type="number" id="bkash_01840606094" class="form-input" value="0">
      </div>
      <div class="form-group">
        <label class="form-label">01842811800 (Personal)</label>
        <input type="number" id="bkash_01842811800" class="form-input" value="0">
      </div>
      <div class="form-group">
        <label class="form-label">01712512227 (Personal)</label>
        <input type="number" id="bkash_01712512227" class="form-input" value="0">
      </div>
      <div class="form-group">
        <label class="form-label">01719852214 (Personal)</label>
        <input type="number" id="bkash_01719852214" class="form-input" value="0">
      </div>
    </div>

    <!-- Nagad Accounts Card -->
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">💳 Nagad Accounts</h2>
      </div>
      <div class="form-group">
        <label class="form-label">01840606094 (Agent)</label>
        <input type="number" id="nagad_01840606094" class="form-input" value="0">
      </div>
      <div class="form-group">
        <label class="form-label">01842811800 (Personal)</label>
        <input type="number" id="nagad_01842811800" class="form-input" value="0">
      </div>
      <div class="form-group">
        <label class="form-label">01712512227 (Personal)</label>
        <input type="number" id="nagad_01712512227" class="form-input" value="0">
      </div>
      <div style="display: flex; justify-content: center; gap: 15px; margin-top: 25px; flex-wrap: wrap;">
        <button class="btn btn-secondary" onclick="storeAllInitialValues()">💾 Set</button>
        <button class="btn btn-danger" onclick="clearAllInitialValues()">🗑️ Reset</button>
      </div>
    </div>
  </div>

  <!-- Add Transaction Card -->
  <div class="card">
    <div class="card-header">
      <h2 class="card-title">➕ Add Transaction</h2>
    </div>
    
    <div class="grid">
      <div class="form-group">
        <label class="form-label">Account Type</label>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="accountType" value="bkash" checked>
            <span>bKash</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="accountType" value="nagad">
            <span>Nagad</span>
          </label>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Number Type</label>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="numberType" value="agent" checked>
            <span>Agent</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="numberType" value="personal">
            <span>Personal</span>
          </label>
        </div>
      </div>
    </div>

    <div class="grid">
      <div class="form-group">
        <label class="form-label">Mobile Number</label>
        <select id="mobileNumber" class="form-select"></select>
      </div>

      <div class="form-group">
        <label class="form-label">Transaction Type</label>
        <select id="txnType" class="form-select">
          <option value="cash_out">Cash Out</option>
          <option value="cash_in">Cash In</option>
          <option value="self_send">Self Send Money</option>
          <option value="customer_send">Customer Send Money</option>
          <option value="recharge">Recharge</option>
          <option value="b2b_out">B2B Out</option>
          <option value="b2b_in">B2B In</option>
          <option value="utility">Utility Bill</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Amount</label>
        <input type="number" id="txnAmount" class="form-input" placeholder="Enter amount" value="0">
      </div>
    </div>

    <div class="btn-group">
      <button class="btn btn-primary" onclick="addTransaction()" id="addTransactionBtn" disabled>
        ➕ Add Transaction
      </button>
      <button class="btn btn-secondary" onclick="downloadPDF()">
        📄 Download PDF
      </button>
    </div>
  </div>

  <!-- Dashboard Stats -->
  <div class="stats-grid" id="dashboardStats">
    <div class="stat-card">
      <div class="stat-label">Current Cash</div>
      <div class="stat-value" id="cashDisplay">৳0.00</div>
    </div>
    <div class="stat-card" style="border-left-color: var(--secondary);">
      <div class="stat-label">Total Transactions</div>
      <div class="stat-value" id="totalTransactions">0</div>
      <div class="stat-subtext">All time</div>
    </div>
  </div>

  <!-- Account Balances Card -->
  <div class="card">
    <div class="card-header">
      <h2 class="card-title">📊 Current Account Balances</h2>
    </div>
    <div class="balance-grid" id="balanceAdjustments"></div>
  </div>

  <!-- Transaction History Card -->
  <div class="card">
    <div class="card-header">
      <h2 class="card-title">📝 Transaction History</h2>
    </div>
    <div id="transactionsList"></div>
  </div>

</div>

<!-- Edit Modal -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>✏️ Edit Transaction</h2>
      <span class="close" onclick="closeEditModal()">&times;</span>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Account Type</label>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="editAccountType" value="bkash">
            <span>bKash</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="editAccountType" value="nagad">
            <span>Nagad</span>
          </label>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Number Type</label>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="editNumberType" value="agent">
            <span>Agent</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="editNumberType" value="personal">
            <span>Personal</span>
          </label>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Mobile Number</label>
        <select id="editMobileNumber" class="form-select"></select>
      </div>

      <div class="form-group">
        <label class="form-label">Transaction Type</label>
        <select id="editTxnType" class="form-select">
          <option value="cash_out">Cash Out</option>
          <option value="cash_in">Cash In</option>
          <option value="self_send">Self Send Money</option>
          <option value="customer_send">Customer Send Money</option>
          <option value="recharge">Recharge</option>
          <option value="b2b_out">B2B Out</option>
          <option value="b2b_in">B2B In</option>
          <option value="utility">Utility Bill</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Amount</label>
        <input type="number" id="editAmount" class="form-input" value="0">
      </div>

      <input type="hidden" id="editSerialNum">
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeEditModal()" style="background:#95a5a6; color:white;">Cancel</button>
      <button class="btn btn-primary" onclick="saveEditedTransaction()">💾 Save Changes</button>
    </div>
  </div>
</div>

<!-- Toast Notification -->
<div id="toast" class="toast">
  <span class="toast-icon" id="toastIcon">✓</span>
  <span class="toast-message" id="toastMessage"></span>
</div>

<script>
// ============================================
// CONSTANTS & CONFIGURATION
// ============================================

const INTEREST_RATES = {
  bkash: {
    cashOut: 0.004,    // 0.4%
    cashIn: 0.00375    // 0.375%
  },
  nagad: {
    cashOut: 0.0041,   // 0.41%
    cashIn: 0.0041     // 0.41%
  }
};

const accounts = {
  bkash: {
    agent: ["01840606094"],
    personal: ["01842811800", "01712512227", "01719852214"]
  },
  nagad: {
    agent: ["01840606094"],
    personal: ["01842811800", "01712512227"]
  }
};

// ============================================
// LEDGER STORAGE & INITIALIZATION
// ============================================

let ledger = JSON.parse(localStorage.getItem("ledger")) || {
  initialCash: 0,
  cash: 0,
  initialBalances: {},
  balances: {},
  transactions: [],
  serial: 1
};

// Ensure backward compatibility
if (!ledger.initialCash) ledger.initialCash = 0;
if (!ledger.initialBalances) ledger.initialBalances = {};
if (!ledger.balances) ledger.balances = {};
if (!ledger.transactions) ledger.transactions = [];
if (!ledger.serial) ledger.serial = 1;

// ============================================
// INITIALIZATION FUNCTIONS
// ============================================

function loadInitialBalances() {
  // Initialize balances and initial balances on first load only
  document.querySelectorAll('[id^="bkash_"],[id^="nagad_"]').forEach(input => {
    const fullKey = input.id;
    const val = parseFloat(input.value) || 0;

    // Only set balances if they don't exist (first time)
    if (ledger.balances[fullKey] === undefined) {
      ledger.balances[fullKey] = val;
    }
    
    // Restore input fields to show INITIAL balances only (never update with current balances)
    if (ledger.initialBalances[fullKey] !== undefined) {
      input.value = ledger.initialBalances[fullKey];
    }
  });

  // Restore initial cash field value
  if (ledger.initialCash > 0) {
    document.getElementById("initialCash").value = ledger.initialCash;
  }

  saveLedger();

  // Enable transaction button if initial values are stored
  if (ledger.initialCash > 0 || Object.keys(ledger.initialBalances).length > 0) {
    document.getElementById('addTransactionBtn').disabled = false;
  }
}

function storeAllInitialValues() {
  const initialCash = parseFloat(document.getElementById("initialCash").value) || 0;

  if (initialCash === 0) {
    showToast('Please enter initial cash amount', 'error');
    return;
  }

  ledger.initialCash = initialCash;
  ledger.cash = initialCash;

  document.querySelectorAll('[id^="bkash_"],[id^="nagad_"]').forEach(input => {
    const fullKey = input.id;
    const val = parseFloat(input.value) || 0;
    ledger.initialBalances[fullKey] = val;
    ledger.balances[fullKey] = val;
  });

  saveLedger();
  updateDisplay();

  document.getElementById('addTransactionBtn').disabled = false;
  showToast('All initial values stored successfully!', 'success');
}

function clearAllInitialValues() {
  // Show confirmation alert
  if (!confirm('Are you sure you want to clear all initial values? This will reset all cash, balances, and transactions to 0.')) {
    return;
  }

  // Clear initial cash and current cash
  ledger.initialCash = 0;
  ledger.cash = 0;
  document.getElementById("initialCash").value = "";

  // Clear all initial balances and current balances
  document.querySelectorAll('[id^="bkash_"],[id^="nagad_"]').forEach(input => {
    const fullKey = input.id;
    ledger.initialBalances[fullKey] = 0;
    ledger.balances[fullKey] = 0;
    input.value = "0";
  });

  // Clear all transactions and reset serial number (this also removes all interest)
  ledger.transactions = [];
  ledger.serial = 1;

  // Save and update display
  saveLedger();
  updateDisplay();

  // Disable add transaction button until new initial values are set
  document.getElementById('addTransactionBtn').disabled = true;
  
  showToast('All initial values, transactions, and interest cleared successfully!', 'success');
}

// ============================================
// TRANSACTION FUNCTIONS
// ============================================

function addTransaction() {
  const mobile = document.getElementById("mobileNumber").value;
  const accType = document.querySelector('input[name="accountType"]:checked').value;
  const numType = document.querySelector('input[name="numberType"]:checked').value;
  const txnType = document.getElementById("txnType").value;
  const amount = parseFloat(document.getElementById("txnAmount").value) || 0;

  if (amount <= 0) {
    showToast('Please enter a valid amount', 'error');
    return;
  }

  let cashChange = 0;      // How much cash changes (positive = increase, negative = decrease)
  let balanceChange = 0;   // How much account balance changes
  let interest = 0;        // Interest amount for agent transactions

  const isAgent = (numType === "agent");

  // ========================================================================
  // TRANSACTION LOGIC PER REQUIREMENTS
  // ========================================================================

  if (txnType === "cash_out") {
    // CASH OUT: Customer withdraws cash from agent
    // Agent gives cash to customer and receives money in mobile account
    if (isAgent) {
      // For Agent: Balance increases by amount + interest
      // bKash: 0.4% interest | Nagad: 0.41% interest
      interest = amount * INTEREST_RATES[accType].cashOut;
      balanceChange = amount + interest;  // Balance += amount + interest
    } else {
      // For Personal: Balance increases by amount only
      balanceChange = amount;
    }
    cashChange = -amount;  // Cash decreases by transaction amount
  }
  else if (txnType === "cash_in") {
    // CASH IN: Customer deposits cash to agent
    // Agent receives cash and sends money from mobile account
    if (isAgent) {
      // For Agent: Balance decreases by (amount - interest)
      // bKash: 0.375% interest | Nagad: 0.41% interest
      interest = amount * INTEREST_RATES[accType].cashIn;
      balanceChange = -(amount - interest);  // Balance -= (amount - interest)
    } else {
      // For Personal: Balance decreases by amount only
      balanceChange = -amount;
    }
    cashChange = amount;  // Cash increases by transaction amount
  }
  else if (txnType === "self_send") {
    // SELF SEND MONEY: Transfer from mobile account to another account
    // Balance increases, Cash decreases
    cashChange = -amount;
    balanceChange = amount;
  }
  else if (txnType === "customer_send") {
    // CUSTOMER SEND MONEY: Receive money from customer
    // Balance decreases, Cash increases
    cashChange = amount;
    balanceChange = -amount;
  }
  else if (txnType === "b2b_out") {
    // B2B OUT: Business to Business outgoing transfer
    // Balance decreases, Cash increases
    cashChange = amount;
    balanceChange = -amount;
  }
  else if (txnType === "b2b_in") {
    // B2B IN: Business to Business incoming transfer
    // Balance increases, Cash decreases
    cashChange = -amount;
    balanceChange = amount;
  }
  else if (txnType === "recharge" || txnType === "utility") {
    // RECHARGE/UTILITY: Payment for services
    // Balance decreases, Cash increases
    cashChange = amount;
    balanceChange = -amount;
  }

  // ========================================================================
  // UPDATE LEDGER
  // ========================================================================

  // Update current cash balance
  ledger.cash += cashChange;

  // Update account balance (using service_number as key)
  const accountKey = accType + "_" + mobile;
  ledger.balances[accountKey] = (ledger.balances[accountKey] || 0) + balanceChange;

  // Store transaction record
  ledger.transactions.push({
    serial: ledger.serial,
    mobile,
    accountType: accType,
    numberType: numType,
    txnType,
    amount,
    interest: interest.toFixed(2),
    cashChange,
    balance: ledger.balances[accountKey],
    datetime: new Date().toLocaleString()
  });

  ledger.serial++;

  // Save to localStorage and update display
  saveLedger();
  updateDisplay();

  // Reset form amount field
  document.getElementById("txnAmount").value = 0;
  
  showToast('Transaction added successfully!', 'success');
}

// ============================================
// EDIT & DELETE FUNCTIONS
// ============================================

function deleteTransaction(serialNum) {
  if (!confirm('Are you sure you want to delete this transaction?')) {
    return;
  }

  const txIndex = ledger.transactions.findIndex(tx => tx.serial === serialNum);

  if (txIndex === -1) {
    showToast('Transaction not found!', 'error');
    return;
  }

  ledger.transactions.splice(txIndex, 1);
  recalculateBalances();

  saveLedger();
  updateDisplay();

  showToast('Transaction deleted successfully!', 'success');
}

function editTransaction(serialNum) {
  const tx = ledger.transactions.find(tx => tx.serial === serialNum);

  if (!tx) {
    showToast('Transaction not found!', 'error');
    return;
  }

  document.getElementById('editSerialNum').value = tx.serial;
  document.querySelector('input[name="editAccountType"][value="' + tx.accountType + '"]').checked = true;
  document.querySelector('input[name="editNumberType"][value="' + tx.numberType + '"]').checked = true;

  populateEditNumbers();

  document.getElementById("editMobileNumber").value = tx.mobile;
  document.getElementById("editTxnType").value = tx.txnType;
  document.getElementById("editAmount").value = tx.amount;

  document.getElementById('editModal').style.display = 'block';
}

function closeEditModal() {
  document.getElementById('editModal').style.display = 'none';
}

function saveEditedTransaction() {
  const serialNum = parseInt(document.getElementById('editSerialNum').value);
  const txIndex = ledger.transactions.findIndex(tx => tx.serial === serialNum);

  if (txIndex === -1) {
    showToast('Transaction not found!', 'error');
    return;
  }

  const oldTx = ledger.transactions[txIndex];

  const mobile = document.getElementById("editMobileNumber").value;
  const accType = document.querySelector('input[name="editAccountType"]:checked').value;
  const numType = document.querySelector('input[name="editNumberType"]:checked').value;
  const txnType = document.getElementById("editTxnType").value;
  const amount = parseFloat(document.getElementById("editAmount").value) || 0;

  let cashChange = 0;
  let balanceChange = 0;
  let interest = 0;

  const isAgent = (numType === "agent");

  if (txnType === "cash_out") {
    if (isAgent) {
      interest = amount * INTEREST_RATES[accType].cashOut;
      balanceChange = amount + interest;
    } else {
      balanceChange = amount;
    }
    cashChange = -amount;
  }
  else if (txnType === "cash_in") {
    if (isAgent) {
      interest = amount * INTEREST_RATES[accType].cashIn;
      balanceChange = -(amount - interest);
    } else {
      balanceChange = -amount;
    }
    cashChange = amount;
  }
  else if (txnType === "self_send") {
    cashChange = -amount;
    balanceChange = amount;
  }
  else if (txnType === "customer_send") {
    cashChange = amount;
    balanceChange = -amount;
  }
  else if (txnType === "b2b_out") {
    cashChange = amount;
    balanceChange = -amount;
  }
  else if (txnType === "b2b_in") {
    cashChange = -amount;
    balanceChange = amount;
  }
  else if (txnType === "recharge" || txnType === "utility") {
    cashChange = amount;
    balanceChange = -amount;
  }

  ledger.transactions[txIndex] = {
    serial: oldTx.serial,
    mobile,
    accountType: accType,
    numberType: numType,
    txnType,
    amount,
    interest: interest.toFixed(2),
    cashChange,
    balance: 0,
    datetime: oldTx.datetime
  };

  recalculateBalances();

  saveLedger();
  updateDisplay();
  closeEditModal();

  showToast('Transaction updated successfully!', 'success');
}

function recalculateBalances() {
  // ========================================================================
  // RECALCULATE ALL BALANCES FROM SCRATCH
  // This is called after editing or deleting transactions to ensure accuracy
  // ========================================================================
  
  // Reset all balances to initial values
  ledger.balances = {};
  for (let key in ledger.initialBalances) {
    ledger.balances[key] = ledger.initialBalances[key];
  }

  // Reset cash to initial amount
  ledger.cash = ledger.initialCash;

  // Reapply all transactions in chronological order
  ledger.transactions.forEach(tx => {
    // Update cash based on transaction cashChange
    ledger.cash += tx.cashChange;

    const accountKey = tx.accountType + "_" + tx.mobile;
    const isAgent = (tx.numberType === "agent");
    let balanceChange = 0;
    let interest = parseFloat(tx.interest) || 0;

    // Calculate balance change based on transaction type
    // (Must match the logic in addTransaction function)
    if (tx.txnType === "cash_out") {
      balanceChange = isAgent ? (tx.amount + interest) : tx.amount;
    }
    else if (tx.txnType === "cash_in") {
      balanceChange = isAgent ? -(tx.amount - interest) : -tx.amount;
    }
    else if (tx.txnType === "self_send") {
      balanceChange = tx.amount;
    }
    else if (tx.txnType === "customer_send") {
      balanceChange = -tx.amount;
    }
    else if (tx.txnType === "b2b_out") {
      balanceChange = -tx.amount;
    }
    else if (tx.txnType === "b2b_in") {
      balanceChange = tx.amount;
    }
    else if (tx.txnType === "recharge" || tx.txnType === "utility") {
      balanceChange = -tx.amount;
    }

    // Apply balance change to account
    ledger.balances[accountKey] = (ledger.balances[accountKey] || 0) + balanceChange;
    
    // Update transaction record with recalculated balance
    tx.balance = ledger.balances[accountKey];
  });
}

// ============================================
// DISPLAY & UI UPDATE
// ============================================

function formatTxnType(txnType) {
  const typeMap = {
    'cash_out': 'Cash Out',
    'cash_in': 'Cash In',
    'self_send': 'Self Send Money',
    'customer_send': 'Customer Send Money',
    'recharge': 'Recharge',
    'b2b_out': 'B2B Out',
    'b2b_in': 'B2B In',
    'utility': 'Utility Bill'
  };
  return typeMap[txnType] || txnType;
}

function updateDisplay() {
  // Restore input fields to show initial balances (never current balances)
  document.querySelectorAll('[id^="bkash_"],[id^="nagad_"]').forEach(input => {
    const fullKey = input.id;
    if (ledger.initialBalances[fullKey] !== undefined) {
      input.value = ledger.initialBalances[fullKey];
    }
  });
  
  // Restore initial cash input field
  if (ledger.initialCash > 0) {
    document.getElementById("initialCash").value = ledger.initialCash;
  }

  // Update cash display
  document.getElementById("cashDisplay").innerText = "৳" + ledger.cash.toFixed(2);

  // Update transaction count
  document.getElementById("totalTransactions").innerText = ledger.transactions.length;

  // Update balance adjustments
  const adjDiv = document.getElementById("balanceAdjustments");
  adjDiv.innerHTML = "";

  for (let key in ledger.balances) {
    const initial = ledger.initialBalances[key] || 0;
    const current = ledger.balances[key] || 0;
    const adj = current - initial;

    const parts = key.split('_');
    const service = parts[0] ? parts[0].toLowerCase() : 'unknown';
    const number = parts[1] || key;

    let accountType = 'Unknown';
    if (accounts[service]) {
      if (accounts[service].agent.includes(number)) {
        accountType = 'Agent';
      } else if (accounts[service].personal.includes(number)) {
        accountType = 'Personal';
      }
    }

    // Calculate total interest for this account
    let totalInterest = 0;
    ledger.transactions.forEach(tx => {
      const txAccountKey = tx.accountType + "_" + tx.mobile;
      if (txAccountKey === key && tx.interest) {
        totalInterest += parseFloat(tx.interest) || 0;
      }
    });

    const serviceLabel = service.toUpperCase();
    const icon = serviceLabel === 'BKASH' ? '📱' : '💳';

    const item = document.createElement("div");
    item.className = "balance-item";
    
    const adjClass = adj > 0 ? 'positive' : (adj < 0 ? 'negative' : '');
    const adjSign = adj > 0 ? '+' : '';
    
    item.innerHTML = `
      <div>
        <div class="balance-label">${icon} ${serviceLabel} ${number} (${accountType})</div>
        <div class="balance-change ${adjClass}">${adjSign}৳${adj.toFixed(2)} from initial | Interest: ৳${totalInterest.toFixed(2)}</div>
      </div>
      <div class="balance-value">৳${current.toFixed(2)}</div>
    `;
    adjDiv.appendChild(item);
  }

  // Update transaction list
  const list = document.getElementById("transactionsList");
  list.innerHTML = "";

  if (ledger.transactions.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📭</div>
        <div class="empty-state-text">No transactions yet. Add your first transaction above!</div>
      </div>
    `;
    return;
  }

  ledger.transactions.slice().reverse().forEach((tx, index) => {
    const item = document.createElement("div");
    item.className = "transaction-item";

    const displaySerial = index + 1;
    const interestText = tx.interest && parseFloat(tx.interest) > 0 ? ` | Interest: ৳${tx.interest}` : "";
    
    const serviceIcon = tx.accountType === 'bkash' ? '📱' : '💳';
    const typeIcon = tx.txnType.includes('cash_out') ? '💸' : 
                     tx.txnType.includes('cash_in') ? '💰' : 
                     tx.txnType.includes('send') ? '📤' : '🔄';

    const content = document.createElement("div");
    content.className = "transaction-content";
    content.innerHTML = `
      <span class="transaction-serial">#${displaySerial}</span>
      ${serviceIcon} ${tx.mobile} | 
      ${typeIcon} ${formatTxnType(tx.txnType)} | 
      Transaction Amount: ৳${tx.amount}${interestText} | 
      Current Balance: ৳${tx.balance.toFixed(2)} | 
      ${tx.datetime}
    `;

    const actions = document.createElement("div");
    actions.className = "transaction-actions";

    const editBtn = document.createElement("button");
    editBtn.className = "btn btn-secondary btn-sm";
    editBtn.textContent = "✏️ Edit";
    editBtn.onclick = function() { editTransaction(tx.serial); };

    const deleteBtn = document.createElement("button");
    deleteBtn.className = "btn btn-danger btn-sm";
    deleteBtn.textContent = "🗑️ Delete";
    deleteBtn.onclick = function() { deleteTransaction(tx.serial); };

    actions.appendChild(editBtn);
    actions.appendChild(deleteBtn);

    item.appendChild(content);
    item.appendChild(actions);

    list.appendChild(item);
  });
}

function saveLedger() {
  localStorage.setItem("ledger", JSON.stringify(ledger));
}

function showToast(message, type = 'success') {
  const toast = document.getElementById('toast');
  const icon = document.getElementById('toastIcon');
  const msg = document.getElementById('toastMessage');

  toast.className = 'toast show toast-' + type;
  icon.textContent = type === 'success' ? '✓' : '✕';
  msg.textContent = message;

  setTimeout(() => {
    toast.classList.remove('show');
  }, 3000);
}

function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 20;

  // Title
  doc.setFontSize(16);
  doc.setFont(undefined, 'bold');
  doc.text("Transaction History", 105, y, { align: 'center' });

  y += 10;

  // Current Cash Balance
  doc.setFontSize(12);
  doc.setFont(undefined, 'normal');
  doc.text(`Current Cash Balance: ৳${ledger.cash.toFixed(2)}`, 20, y);

  y += 10;

  // Account Balances
  doc.setFontSize(10);
  doc.setFont(undefined, 'bold');
  doc.text("Account Balances:", 20, y);
  y += 6;

  doc.setFont(undefined, 'normal');
  for (let key in ledger.balances) {
    const current = ledger.balances[key] || 0;
    const parts = key.split('_');
    const service = parts[0] ? parts[0].toUpperCase() : 'UNKNOWN';
    const number = parts[1] || key;

    let accountType = 'Unknown';
    if (accounts[parts[0].toLowerCase()]) {
      if (accounts[parts[0].toLowerCase()].agent.includes(number)) {
        accountType = 'Agent';
      } else if (accounts[parts[0].toLowerCase()].personal.includes(number)) {
        accountType = 'Personal';
      }
    }

    let totalInterest = 0;
    ledger.transactions.forEach(tx => {
      const txAccountKey = tx.accountType + "_" + tx.mobile;
      if (txAccountKey === key && tx.interest) {
        totalInterest += parseFloat(tx.interest) || 0;
      }
    });

    doc.text(`  ${service} ${number} (${accountType}): ৳${current.toFixed(2)} (Interest: ৳${totalInterest.toFixed(2)})`, 20, y);
    y += 5;
  }

  y += 5;

  // Transaction History Table Header
  doc.setFont(undefined, 'bold');
  doc.text("#", 10, y);
  doc.text("Mobile", 20, y);
  doc.text("Type", 55, y);
  doc.text("Amount", 95, y);
  doc.text("Interest", 120, y);
  doc.text("Balance", 145, y);
  doc.text("Date/Time", 170, y);

  y += 2;
  doc.line(10, y, 200, y); // Horizontal line
  y += 5;

  doc.setFont(undefined, 'normal');
  doc.setFontSize(8);

  // Transaction rows in reverse order (newest first, matching UI)
  ledger.transactions.slice().reverse().forEach((tx, index) => {
    const displaySerial = index + 1;
    const interestVal = tx.interest && parseFloat(tx.interest) > 0 ? tx.interest : "0.00";

    doc.text(`${displaySerial}`, 10, y);
    doc.text(tx.mobile, 20, y);
    doc.text(formatTxnType(tx.txnType).substring(0, 18), 55, y);
    doc.text(tx.amount.toString(), 95, y);
    doc.text(interestVal, 120, y);
    doc.text(tx.balance.toFixed(2), 145, y);
    doc.text(tx.datetime, 170, y);

    y += 6;

    if (y > 280) {
      doc.addPage();
      y = 20;
      // Re-add header on new page
      doc.setFontSize(10);
      doc.setFont(undefined, 'bold');
      doc.text("#", 10, y);
      doc.text("Mobile", 20, y);
      doc.text("Type", 55, y);
      doc.text("Amount", 95, y);
      doc.text("Interest", 120, y);
      doc.text("Balance", 145, y);
      doc.text("Date/Time", 170, y);
      y += 5;
      doc.setFont(undefined, 'normal');
      doc.setFontSize(8);
    }
  });

  // Generate filename with current date
  const now = new Date();
  const dateStr = now.toISOString().split('T')[0]; // YYYY-MM-DD format
  const filename = `transaction_history_${dateStr}.pdf`;

  doc.save(filename);
  showToast('PDF downloaded successfully!', 'success');
}
